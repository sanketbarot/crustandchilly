<!DOCTYPE html>
<html>
<head>
<title>Clearing Cache...</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta charset="UTF-8">
</head>
<body style="font-family:system-ui,sans-serif;text-align:center;padding:50px 20px;background:#1C1C1C;color:#FBF7F0;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
<div style="font-size:4rem;margin-bottom:20px;">🧹</div>
<h1 style="margin-bottom:20px;">Clearing Cache</h1>
<p id="status" style="opacity:0.7;line-height:2;">Please wait...</p>
<script>
(async function() {
  const status = document.getElementById('status');
  try {
    localStorage.clear();
    sessionStorage.clear();
    status.innerHTML += '<br>✓ Storage cleared';
    
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (let reg of regs) await reg.unregister();
      status.innerHTML += '<br>✓ Service workers removed (' + regs.length + ')';
    }
    
    if ('caches' in window) {
      const keys = await caches.keys();
      for (let key of keys) await caches.delete(key);
      status.innerHTML += '<br>✓ Cache deleted (' + keys.length + ' items)';
    }
    
    document.cookie.split(";").forEach(c => {
      document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
    });
    status.innerHTML += '<br>✓ Cookies cleared';
    status.innerHTML += '<br><br><strong style="color:#25D366">✅ All clear! Redirecting...</strong>';
    
    setTimeout(() => {
      window.location.href = 'index.html?nocache=' + Date.now();
    }, 2000);
  } catch(e) {
    status.innerHTML += '<br>⚠ Error: ' + e.message;
    setTimeout(() => location.href = 'index.html', 3000);
  }
})();
</script>
</body>
</html>
