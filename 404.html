<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 - Page Not Found | Crust & Chilly</title>
<meta name="robots" content="noindex,follow">
<meta name="theme-color" content="#2B1810">
<link rel="icon" type="image/png" href="/images/logo.png">
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:100vh;
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        background:linear-gradient(135deg,#FDFAF3 0%,#FFF8ED 100%);
        text-align:center;
        padding:20px;
        overflow:hidden;
    }
    .err-wrap{
        max-width:500px;
        animation:fadeInUp 0.6s ease;
    }
    .err-emoji{
        font-size:5rem;
        margin-bottom:20px;
        display:inline-block;
        animation:bounce 2s ease infinite;
    }
    h1{
        font-size:clamp(4rem,15vw,7rem);
        margin:0;
        color:#2B1810;
        font-weight:900;
        line-height:1;
        background:linear-gradient(135deg,#D4351C,#F59E0B);
        -webkit-background-clip:text;
        background-clip:text;
        -webkit-text-fill-color:transparent;
    }
    h2{
        color:#2B1810;
        margin:15px 0 10px;
        font-size:clamp(1.2rem,4vw,1.8rem);
        font-weight:700;
    }
    p{
        color:#6B7280;
        margin:15px 0 30px;
        font-size:0.95rem;
        line-height:1.6;
    }
    .btns{
        display:flex;
        gap:12px;
        justify-content:center;
        flex-wrap:wrap;
    }
    a{
        display:inline-flex;
        align-items:center;
        gap:8px;
        padding:14px 26px;
        text-decoration:none;
        border-radius:50px;
        font-weight:700;
        font-size:0.9rem;
        transition:transform 0.3s;
    }
    .btn-primary{
        background:linear-gradient(135deg,#D4351C,#E85A3F);
        color:#fff;
        box-shadow:0 10px 30px rgba(212,53,28,0.3);
    }
    .btn-secondary{
        background:#fff;
        color:#2B1810;
        border:2px solid #2B1810;
    }
    a:hover{transform:translateY(-3px)}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
</style>
</head>
<body>
<div class="err-wrap">
    <div class="err-emoji">🍔</div>
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>The dish you're looking for isn't on our menu.<br>Let's get you back to something delicious!</p>
    <div class="btns">
        <a href="/" class="btn-primary">← Back to Home</a>
        <a href="tel:9664870840" class="btn-secondary">📞 Call Us</a>
    </div>
</div>
</body>
</html>
